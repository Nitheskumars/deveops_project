services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-net
  backend:
    image: ${BACKEND_IMAGE:-mern-backend:jenkins}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/taskdb}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      - mongo
    networks:
      - mern-net
  frontend:
    image: ${FRONTEND_IMAGE:-mern-frontend:jenkins}
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mern-net
volumes:
  mongo-data:
networks:
  mern-net:
    driver: bridge
