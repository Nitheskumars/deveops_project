services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: client
      args:
        - VITE_API_URL=http://18.61.64.63:5000/api
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"

    depends_on:
      - backend
